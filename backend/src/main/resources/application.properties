spring.config.import=optional:file:.env[.properties]

# Database — values supplied by .env (DB_URL, DB_USERNAME, DB_PASSWORD)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT — jwt.secret and jwt.expiration-ms supplied by .env
# Server
server.port=8000

# App
spring.application.name=parkit

# Email — GMAIL_USERNAME and GMAIL_APP_PASSWORD supplied by .env
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
